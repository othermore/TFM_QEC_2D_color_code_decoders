name: Build and Release LaTeX

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Required to create/update releases

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile cover.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cover.tex

      - name: Compile main.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Compile main_digital.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main_digital.tex

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Compiled PDFs
          body: |
            Automatic build of the Master's Thesis.
            Last updated on ${{ github.event.head_commit.timestamp }}.
          files: |
            cover.pdf
            main.pdf
            main_digital.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
