name: Build and Release LaTeX

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Execution logic
        id: check
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            commits=$(git log --since="24 hours" --oneline)
            if [ -z "$commits" ]; then
              echo "No changes in the last 24h. Canceling build."
              echo "run_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "run_build=true" >> "$GITHUB_OUTPUT"

      - name: Prepare environment
        if: steps.check.outputs.run_build == 'true'
        run: |
          echo "=== Cleaning and copying figures ==="
          mkdir -p thesis/figures
          cp -a figures/. thesis/figures/
          echo "=== Verifying content ==="
          ls -la thesis/figures/

      - name: Compile cover.tex
        if: steps.check.outputs.run_build == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: thesis
          root_file: cover.tex

      - name: Compile main.tex
        if: steps.check.outputs.run_build == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: thesis
          root_file: main.tex

      - name: Compile main_digital.tex
        if: steps.check.outputs.run_build == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: thesis
          root_file: main_digital.tex

      - name: Prepare PDF directory
        if: steps.check.outputs.run_build == 'true'
        run: |
          mkdir -p thesis_pdf
          mv thesis/*.pdf thesis_pdf/ 2>/dev/null || true

      - name: Commit PDF files
        if: steps.check.outputs.run_build == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update compiled PDFs"
          file_pattern: "thesis_pdf/*.pdf"

      - name: Create or Update Release
        if: steps.check.outputs.run_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Compiled PDFs
          body: "Automatic build of the Master's Thesis."
          files: |
            thesis_pdf/cover.pdf
            thesis_pdf/main.pdf
            thesis_pdf/main_digital.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
