name: Build and Release LaTeX

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify recent commits
        id: verify_commits
        run: |
          # Verificamos si hay commits en las últimas 24 horas
          commits=$(git log --since="24 hours" --oneline)
          if [ -z "$commits" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync figures
        # Esta es la corrección: aseguramos que si el job corre, las fotos se copien
        if: steps.verify_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          # Creamos el directorio por si no existe y copiamos el contenido
          mkdir -p thesis/figures
          cp -v figures/* thesis/figures/
          echo "Contenido de thesis/figures preparado."

      - name: Compile LaTeX documents
        if: steps.verify_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: xu-cheng/latex-action@v3
        with:
          # Compilamos desde thesis para mantener tus rutas de Overleaf
          working_directory: thesis
          # Compilamos los tres ficheros en un solo paso de la acción para mayor eficiencia
          root_file: |
            cover.tex
            main.tex
            main_digital.tex

      - name: Prepare PDF directory
        if: steps.verify_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p thesis_pdf
          # Movemos solo los resultados finales
          mv thesis/cover.pdf thesis_pdf/ 2>/dev/null || true
          mv thesis/main.pdf thesis_pdf/ 2>/dev/null || true
          mv thesis/main_digital.pdf thesis_pdf/ 2>/dev/null || true

      - name: Commit PDF files
        if: steps.verify_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update compiled PDFs"
          file_pattern: "thesis_pdf/*.pdf"

      - name: Create or Update Release
        if: steps.verify_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Compiled PDFs
          body: |
            Automatic build of the Master's Thesis.
            Generated on: $(date +'%Y-%m-%d %H:%M:%S')
          files: |
            thesis_pdf/cover.pdf
            thesis_pdf/main.pdf
            thesis_pdf/main_digital.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
