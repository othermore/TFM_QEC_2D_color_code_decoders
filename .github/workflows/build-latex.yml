name: Build and Release LaTeX

on:
  schedule:
    # Ejecución a la 1:00 AM UTC (3:00 AM CEST en España)
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify recent commits
        id: verify_commits
        run: |
          # Busca si ha habido cambios en las últimas 24 horas
          commits=$(git log --since="24 hours" --oneline)
          if [ -z "$commits" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compile cover.tex
        if: steps.verify_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: thesis
          root_file: cover.tex
        env:
          # Permite buscar archivos en la raíz (..) desde la carpeta thesis
          TEXINPUTS: ".:..:"

      - name: Compile main.tex
        if: steps.verify_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: thesis
          root_file: main.tex
        env:
          TEXINPUTS: ".:..:"

      - name: Compile main_digital.tex
        if: steps.verify_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: thesis
          root_file: main_digital.tex
        env:
          TEXINPUTS: ".:..:"

      - name: Prepare PDF directory
        if: steps.verify_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p thesis_pdf
          # Mueve los PDFs generados en 'thesis/' a la carpeta de salida
          mv thesis/*.pdf thesis_pdf/

      - name: Commit PDF files
        if: steps.verify_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update compiled PDFs"
          file_pattern: "thesis_pdf/*.pdf"

      - name: Create or Update Release
        if: steps.verify_commits.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Compiled PDFs
          body: |
            Automatic build of the Master's Thesis.
            Last update check: ${{ github.event.head_commit.timestamp }}
          files: |
            thesis_pdf/cover.pdf
            thesis_pdf/main.pdf
            thesis_pdf/main_digital.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
